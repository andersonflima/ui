name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

# Permite só uma execução por ref (cancela a anterior).
concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Chromatic precisa do histórico git completo.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # O Storybook (packages/docs) importa o dist do core — buildar antes.
      - run: npm run build -w @andespindola/ui-core
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/docs
          buildScriptName: build-storybook
          onlyChanged: true
          exitZeroOnChanges: true
